        body { background: #0c0c0c; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }

        .trade-grid { display: flex; justify-content: space-around; gap: 20px; margin-bottom: 25px; }
        .trade-column { flex: 1; background: #1c1c1c; padding: 15px; border-radius: 8px; border: 1px solid #2d2d2d; }
        h3 { color: #aaa; margin-top: 0; }
        select { width: 100%; padding: 12px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; }
        select:focus { border-color: #ff4500; outline: none; }
        .result-box { padding: 20px; border-radius: 8px; font-size: 18px; font-weight: bold; background: #222; border: 1px solid #333; margin-top: 15px; transition: all 0.3s ease; }

        .lose { background: #b71c1c; color: #ef9a9a; border-color: #c62828; }

    <h1>🧮 Калькулятор Трейдов</h1>
    <p>Проверь ценность фруктов перед обменом, чтобы тебя не обманули!</p>

    <div class="trade-calculator">
        <div class="trade-grid">
            <div class="trade-column">
                <h3>Ты отдаешь:</h3>
                <select id="my-fruit" onchange="calculateTrade()">
                    <option value="0">Выбери фрукт...</option>
                    <option value="115000000">Kitsune (115M Value)</option>
                    <option value="90000000">Dragon (90M Value)</option>
                    <option value="40000000">Leopard (40M Value)</option>
                    <option value="25000000">Dough (25M Value)</option>
                    <option value="7000000">Buddha (7M Value)</option>
                    <option value="5000">Rocket (5k Value)</option>
                </select>
            </div>

            <div class="trade-column">
                <h3>Тебе дают:</h3>
                <select id="their-fruit" onchange="calculateTrade()">
                    <option value="0">Выбери фрукт...</option>
                    <option value="115000000">Kitsune (115M Value)</option>
                    <option value="90000000">Dragon (90M Value)</option>
                    <option value="40000000">Leopard (40M Value)</option>
                    <option value="25000000">Dough (25M Value)</option>
                    <option value="7000000">Buddha (7M Value)</option>
                    <option value="5000">Rocket (5k Value)</option>
                </select>
            </div>
        </div>

        <div id="trade-result" class="result-box">Укажи фрукты, чтобы оценить сделку</div>
    </div>

    <script>
    function calculateTrade() {
        const myValue = parseInt(document.getElementById('my-fruit').value);
        const theirValue = parseInt(document.getElementById('their-fruit').value);
        const resultDiv = document.getElementById('trade-result');

        if (myValue === 0 || theirValue === 0) {
            resultDiv.innerHTML = "Укажи фрукты в обоих полях!";
            resultDiv.className = "result-box";
            return;
        }

        if (myValue === theirValue) {
            resultDiv.innerHTML = "⚖️ Абсолютно честный обмен! Ценность одинаковая.";
            resultDiv.className = "result-box equal";
        } else if (myValue > theirValue) {
            let diff = (myValue - theirValue) / 1000000;
            resultDiv.innerHTML = `❌ Плохой трейд! Вы теряете около ${diff.toFixed(1)}M ценности.`;
            resultDiv.className = "result-box lose";
        } else {
            let diff = (theirValue - myValue) / 1000000;
            resultDiv.innerHTML = `✅ Отличный трейд! Вы в плюсе на +${diff.toFixed(1)}M ценности.`;
            resultDiv.className = "result-box win";
        }
    }
    </script>
